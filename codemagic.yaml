workflows:
  privatecloud-ios:
    name: PrivateCloud iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - ymnknet
      vars:
        XCODE_PROJECT: "Nextcloud.xcodeproj"
        XCODE_SCHEME: "Nextcloud"
        APP_STORE_CONNECT_KEY_IDENTIFIER: 82H5J855MP
        APP_STORE_CONNECT_ISSUER_ID: 5cb3a482-8441-442e-a748-62ef51dc132d
        BUNDLE_ID: "com.ymnknet.privatecloud"
        TEAM_ID: "MU4CY2V7WU"
      xcode: latest
    scripts:
      - name: Fetch signing files for all targets
        script: |
          for bid in \
            "$BUNDLE_ID" \
            "$BUNDLE_ID.File-Provider-Extension" \
            "$BUNDLE_ID.File-Provider-Extension-UI" \
            "$BUNDLE_ID.Share" \
            "$BUNDLE_ID.Widget" \
            "$BUNDLE_ID.WidgetDashboardIntentHandler" \
            "$BUNDLE_ID.Notification-Service-Extension" \
            "$BUNDLE_ID.Action-Assistant"; do
            echo "=== Fetching: $bid ==="
            app-store-connect fetch-signing-files "$bid" \
              --platform IOS \
              --type IOS_APP_ADHOC \
              --create
          done
      - name: Set up keychain and profiles
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Trust build plugins
        script: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
