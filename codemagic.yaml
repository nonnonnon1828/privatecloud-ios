workflows:
  privatecloud-ios:
    name: PrivateCloud iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - ymnknet
      vars:
        XCODE_PROJECT: "Nextcloud.xcodeproj"
        XCODE_SCHEME: "Nextcloud"
        APP_STORE_CONNECT_KEY_IDENTIFIER: 82H5J855MP
        APP_STORE_CONNECT_ISSUER_ID: 5cb3a482-8441-442e-a748-62ef51dc132d
        BUNDLE_ID: "com.ymnknet.privatecloud"
        TEAM_ID: "MU4CY2V7WU"
      xcode: latest
    scripts:
      - name: Set up keychain with Distribution certificate
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save
          keychain add-certificates
      - name: Write ASC API key for Xcode
        script: |
          python3 << 'PYEOF'
          import os, sys
          key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
          if '\\n' in key and '\n' not in key.replace('\\n', ''):
              key = key.replace('\\n', '\n')
          if not key.strip():
              print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY is empty", file=sys.stderr)
              sys.exit(1)
          path = '/tmp/AuthKey.p8'
          with open(path, 'w') as f:
              f.write(key)
              if not key.endswith('\n'):
                  f.write('\n')
          with open(path) as f:
              content = f.read()
          lines = content.strip().split('\n')
          print(f"Key file: {len(lines)} lines")
          if 'BEGIN PRIVATE KEY' not in lines[0]:
              print(f"ERROR: unexpected first line: {lines[0][:40]}", file=sys.stderr)
              sys.exit(1)
          if 'END PRIVATE KEY' not in lines[-1]:
              print(f"ERROR: unexpected last line: {lines[-1][:40]}", file=sys.stderr)
              sys.exit(1)
          print("ASC API key written OK")
          PYEOF
      - name: Delete stale Development certificates
        script: |
          python3 << 'PYEOF'
          import json, os, sys, time
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError
          try:
              import jwt
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'PyJWT[crypto]', '-q'])
              import jwt
          key_id = os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open('/tmp/AuthKey.p8') as f:
              private_key = f.read()
          token = jwt.encode(
              {'iss': issuer_id, 'iat': int(time.time()), 'exp': int(time.time()) + 1200,
               'aud': 'appstoreconnect-v1'},
              private_key, algorithm='ES256', headers={'kid': key_id})
          if isinstance(token, bytes):
              token = token.decode()
          auth = {'Authorization': f'Bearer {token}'}
          deleted = 0
          for cert_type in ['DEVELOPMENT', 'IOS_DEVELOPMENT']:
              req = Request(
                  f'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]={cert_type}',
                  headers=auth)
              certs = json.loads(urlopen(req).read()).get('data', [])
              for cert in certs:
                  cid = cert['id']
                  name = cert.get('attributes', {}).get('name', '?')
                  try:
                      urlopen(Request(
                          f'https://api.appstoreconnect.apple.com/v1/certificates/{cid}',
                          headers=auth, method='DELETE'))
                      print(f"Deleted {cert_type} cert {cid} ({name})")
                      deleted += 1
                  except HTTPError as e:
                      print(f"WARN: {cid}: {e.code} {e.reason}", file=sys.stderr)
          if deleted:
              print(f"Cleaned up {deleted} stale certificate(s)")
          else:
              print("No stale Development certificates found")
          PYEOF
      - name: Trust build plugins
        script: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Create ExportOptions plist
        script: |
          /usr/libexec/PlistBuddy -c "Add :method string ad-hoc" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" /tmp/ExportOptions.plist
          echo "--- ExportOptions.plist ---"
          cat /tmp/ExportOptions.plist
      - name: Archive
        script: |
          set -o pipefail
          xcodebuild archive \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/Nextcloud.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild_archive.log || {
              echo "=== ARCHIVE ERRORS ==="
              grep -i 'error:' /tmp/xcodebuild_archive.log | tail -30
              exit 1
            }
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath /tmp/Nextcloud.xcarchive \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
