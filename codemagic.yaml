workflows:
  privatecloud-ios:
    name: PrivateCloud iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - ymnknet
      vars:
        XCODE_PROJECT: "Nextcloud.xcodeproj"
        XCODE_SCHEME: "Nextcloud"
        APP_STORE_CONNECT_KEY_IDENTIFIER: 82H5J855MP
        APP_STORE_CONNECT_ISSUER_ID: 5cb3a482-8441-442e-a748-62ef51dc132d
        BUNDLE_ID: "com.ymnknet.privatecloud"
        TEAM_ID: "MU4CY2V7WU"
      xcode: 16.2
    scripts:
      - name: Set up keychain and signing certificates
        script: |
          keychain initialize

          # --- Generate JWT for ASC API ---
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | tr -d '\r' > /tmp/asc_key.p8
          if grep -q '\\n' /tmp/asc_key.p8; then
            python3 -c "
          import sys
          with open('/tmp/asc_key.p8') as f: d=f.read()
          with open('/tmp/asc_key.p8','w') as f: f.write(d.replace('\\\\n','\n'))
          "
          fi
          HEADER=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$APP_STORE_CONNECT_KEY_IDENTIFIER" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          NOW=$(date +%s)
          EXP=$((NOW + 600))
          PAYLOAD=$(printf '{"iss":"%s","iat":%d,"exp":%d,"aud":"appstoreconnect-v1"}' "$APP_STORE_CONNECT_ISSUER_ID" "$NOW" "$EXP" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          SIGN_INPUT="${HEADER}.${PAYLOAD}"
          DER_SIG=$(printf '%s' "$SIGN_INPUT" | openssl dgst -sha256 -sign /tmp/asc_key.p8 -binary | openssl base64 -e -A)
          RAW_SIG=$(python3 << PYEOF
          import base64
          der = base64.b64decode("${DER_SIG}")
          i = 2
          r_len = der[i+1]; r = der[i+2:i+2+r_len]; i = i+2+r_len
          s_len = der[i+1]; s = der[i+2:i+2+s_len]
          r = r[-32:].rjust(32, b'\x00')
          s = s[-32:].rjust(32, b'\x00')
          import sys; sys.stdout.write(base64.urlsafe_b64encode(r+s).rstrip(b'=').decode())
          PYEOF
          )
          JWT="${SIGN_INPUT}.${RAW_SIG}"
          rm -f /tmp/asc_key.p8

          # --- Delete ALL development certificates (both types) ---
          for CERT_TYPE in DEVELOPMENT IOS_DEVELOPMENT; do
            echo "=== Listing $CERT_TYPE certificates ==="
            RESP=$(curl -s -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=$CERT_TYPE&limit=200")
            COUNT=$(echo "$RESP" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('data',[])))" 2>/dev/null || echo "parse-error")
            echo "Found $COUNT certificates of type $CERT_TYPE"
            IDS=$(echo "$RESP" | python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin).get('data',[])]" 2>/dev/null || true)
            for cid in $IDS; do
              echo "Revoking $CERT_TYPE cert: $cid"
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $JWT" \
                "https://api.appstoreconnect.apple.com/v1/certificates/$cid")
              echo "  -> HTTP $HTTP"
            done
          done

          echo "Waiting for revocation to propagate..."
          sleep 5

          # --- Fetch Distribution certificate ---
          echo "=== Fetching IOS_DISTRIBUTION certificate ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save

          # --- Create fresh Development certificate with same key ---
          echo "=== Creating new DEVELOPMENT certificate ==="
          app-store-connect certificates create \
            --type DEVELOPMENT \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save || {
            echo "Create failed (may already exist), trying list..."
            app-store-connect certificates list \
              --type DEVELOPMENT \
              --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
              --save
          }

          # --- Import all certificates into keychain ---
          keychain add-certificates

          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning | head -20
      - name: Write ASC API key for Xcode
        script: |
          mkdir -p ~/private_keys
          python3 << 'PYEOF'
          import os, sys
          key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
          if '\\n' in key and '\n' not in key.replace('\\n', ''):
              key = key.replace('\\n', '\n')
          if not key.strip():
              print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY is empty", file=sys.stderr)
              sys.exit(1)
          key_id = os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER']
          path = os.path.expanduser(f'~/private_keys/AuthKey_{key_id}.p8')
          with open(path, 'w') as f:
              f.write(key)
              if not key.endswith('\n'):
                  f.write('\n')
          print(f"ASC API key written to {path}")
          PYEOF
      - name: Trust build plugins
        script: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Archive with automatic signing
        script: |
          KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          set -o pipefail
          xcodebuild archive \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/Nextcloud.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild_archive.log || {
              echo ""
              echo "========================================="
              echo "ARCHIVE FAILED - key error lines:"
              echo "========================================="
              grep -iE '(error:|failed to|provision|sign|entitlement|capability|authentication|no profile|revoke)' /tmp/xcodebuild_archive.log | tail -50
              exit 1
            }
      - name: Export ad-hoc IPA
        script: |
          KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          cat > /tmp/ExportOptions.plist << 'EXPEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>MU4CY2V7WU</string>
          </dict>
          </plist>
          EXPEOF
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/Nextcloud.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/xcodebuild_export.log || {
              echo ""
              echo "========================================="
              echo "EXPORT FAILED - key error lines:"
              echo "========================================="
              grep -iE '(error:|failed to|provision|sign|entitlement|capability)' /tmp/xcodebuild_export.log | tail -30
              exit 1
            }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log
