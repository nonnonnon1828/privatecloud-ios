workflows:
  privatecloud-ios:
    name: PrivateCloud iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - ymnknet
      vars:
        XCODE_PROJECT: "Nextcloud.xcodeproj"
        XCODE_SCHEME: "Nextcloud"
        APP_STORE_CONNECT_KEY_IDENTIFIER: 82H5J855MP
        APP_STORE_CONNECT_ISSUER_ID: 5cb3a482-8441-442e-a748-62ef51dc132d
        BUNDLE_ID: "com.ymnknet.privatecloud"
        TEAM_ID: "MU4CY2V7WU"
      xcode: latest
    scripts:
      - name: Delete stale profiles and certs
        script: |
          # --- Generate JWT for ASC API ---
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | tr -d '\r' > /tmp/asc_key.p8
          if grep -q '\\n' /tmp/asc_key.p8; then
            python3 -c "
          import sys
          with open('/tmp/asc_key.p8') as f: d=f.read()
          with open('/tmp/asc_key.p8','w') as f: f.write(d.replace('\\\\n','\n'))
          "
          fi
          HEADER=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$APP_STORE_CONNECT_KEY_IDENTIFIER" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          NOW=$(date +%s)
          EXP=$((NOW + 600))
          PAYLOAD=$(printf '{"iss":"%s","iat":%d,"exp":%d,"aud":"appstoreconnect-v1"}' "$APP_STORE_CONNECT_ISSUER_ID" "$NOW" "$EXP" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          SIGN_INPUT="${HEADER}.${PAYLOAD}"
          DER_SIG=$(printf '%s' "$SIGN_INPUT" | openssl dgst -sha256 -sign /tmp/asc_key.p8 -binary | openssl base64 -e -A)
          RAW_SIG=$(python3 << PYEOF
          import base64
          der = base64.b64decode("${DER_SIG}")
          i = 2
          r_len = der[i+1]; r = der[i+2:i+2+r_len]; i = i+2+r_len
          s_len = der[i+1]; s = der[i+2:i+2+s_len]
          r = r[-32:].rjust(32, b'\x00')
          s = s[-32:].rjust(32, b'\x00')
          import sys; sys.stdout.write(base64.urlsafe_b64encode(r+s).rstrip(b'=').decode())
          PYEOF
          )
          JWT="${SIGN_INPUT}.${RAW_SIG}"
          rm -f /tmp/asc_key.p8

          # --- Delete stale development certificates ---
          for CERT_TYPE in DEVELOPMENT IOS_DEVELOPMENT; do
            echo "=== Cleaning $CERT_TYPE certificates ==="
            RESP=$(curl -s -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=$CERT_TYPE&limit=200")
            IDS=$(echo "$RESP" | python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin).get('data',[])]" 2>/dev/null || true)
            for cid in $IDS; do
              echo "Deleting cert $cid"
              curl -s -o /dev/null -w "  HTTP %{http_code}\n" -X DELETE \
                -H "Authorization: Bearer $JWT" \
                "https://api.appstoreconnect.apple.com/v1/certificates/$cid" || true
            done
          done

          # --- Delete stale provisioning profiles (force recreation with App Groups) ---
          for PROF_TYPE in IOS_APP_ADHOC IOS_APP_DEVELOPMENT; do
            echo "=== Cleaning $PROF_TYPE profiles ==="
            RESP=$(curl -s -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/profiles?filter[profileType]=$PROF_TYPE&limit=200")
            IDS=$(echo "$RESP" | python3 -c "import sys,json; [print(p['id']) for p in json.load(sys.stdin).get('data',[])]" 2>/dev/null || true)
            for pid in $IDS; do
              echo "Deleting profile $pid"
              curl -s -o /dev/null -w "  HTTP %{http_code}\n" -X DELETE \
                -H "Authorization: Bearer $JWT" \
                "https://api.appstoreconnect.apple.com/v1/profiles/$pid" || true
            done
          done
          echo "Cleanup done."
      - name: Fetch signing files for all targets
        script: |
          for bid in \
            "$BUNDLE_ID" \
            "$BUNDLE_ID.File-Provider-Extension" \
            "$BUNDLE_ID.File-Provider-Extension-UI" \
            "$BUNDLE_ID.Share" \
            "$BUNDLE_ID.Widget" \
            "$BUNDLE_ID.WidgetDashboardIntentHandler" \
            "$BUNDLE_ID.Notification-Service-Extension" \
            "$BUNDLE_ID.Action-Assistant"; do
            echo "=== Fetching: $bid ==="
            app-store-connect fetch-signing-files "$bid" \
              --platform IOS \
              --type IOS_APP_ADHOC \
              --create
          done
      - name: Set up keychain and profiles
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Trust build plugins
        script: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Build IPA
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            2>&1 | tee /tmp/xcodebuild_build.log || {
              echo ""
              echo "========================================="
              echo "BUILD FAILED - key error lines:"
              echo "========================================="
              grep -iE '(error:|failed|provision|sign|entitlement)' /tmp/xcodebuild_build.log | tail -30
              exit 1
            }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_build.log
