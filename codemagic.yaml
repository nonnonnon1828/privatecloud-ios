workflows:
  privatecloud-ios:
    name: PrivateCloud iOS
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - ymnknet
      vars:
        XCODE_PROJECT: "Nextcloud.xcodeproj"
        XCODE_SCHEME: "Nextcloud"
        APP_STORE_CONNECT_KEY_IDENTIFIER: 82H5J855MP
        APP_STORE_CONNECT_ISSUER_ID: 5cb3a482-8441-442e-a748-62ef51dc132d
        BUNDLE_ID: "com.ymnknet.privatecloud"
      xcode: latest
    scripts:
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_ADHOC \
            --create
      - name: Set up keychain and profiles
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Trust build plugins
        script: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Build IPA
        script: |
          set -o pipefail
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/Nextcloud.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=MU4CY2V7WU \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /tmp/xcodebuild_archive.log || {
              echo "=== ERRORS ==="
              grep -i 'error:' /tmp/xcodebuild_archive.log | tail -50
              exit 1
            }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_archive.log
